<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousuf & Nafeesa's Walima Seating</title>
    <style>
        :root {
            --bg-color: #FDFBF7; /* Warm Cream */
            --text-color: #2B2B2B; /* Charcoal */
            --accent-color: #9E1B22; /* Deep Crimson */
            --gold-accent: #D4AF37; /* Elegant Gold */
        }
        
        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle fade in for the whole page */
        @keyframes pageLoad {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        body {
            animation: pageLoad 1.2s ease-in-out;
        }

        .header-image {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-bottom: 3px solid var(--accent-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px 0; /* Slightly reduced top padding to help fit screens */
        }

        /* The Bismillah Text */
        .bismillah {
            font-size: 0.95rem;
            color: var(--gold-accent);
            font-style: italic;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 5px;
            color: var(--text-color);
            font-weight: normal;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 1.6rem;
            margin-top: 0;
            color: var(--accent-color);
            font-style: italic;
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
        }

        /* Elegant gold lines surrounding the Walima text */
        h2::before, h2::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40px;
            height: 1px;
            background-color: var(--gold-accent);
        }

        h2::before { right: 100%; margin-right: 15px; }
        h2::after { left: 100%; margin-left: 15px; }

        p.instructions {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #555;
            font-style: italic;
        }

        .search-box {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            border: 1px solid #ccc;
            border-radius: 30px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.4s ease;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        /* Glow and expand slightly on focus */
        .search-box:focus {
            border-color: var(--gold-accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        #results {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* This is the fix! The invisible cushion only adds padding if there are results */
        #results:not(:empty) {
            padding-bottom: 350px; 
        }

        .guest-card {
            background: white;
            border: 1px solid #eee;
            border-left: 6px solid var(--accent-color);
            padding: 22px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Subtle hover lift effect */
        .guest-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(158, 27, 34, 0.1);
            border-left-color: var(--gold-accent);
        }

        .guest-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--text-color);
        }

        .table-info {
            text-align: right;
        }
        
        .table-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .table-number {
            font-size: 2.2rem;
            color: var(--gold-accent);
            font-weight: bold;
            line-height: 1;
        }

        /* Smooth entrance for the cards */
        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.85rem;
            color: #999;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.8;
        }

        /* New footer styling for the appetizers note */
        .footer-time {
            color: var(--gold-accent);
            font-style: italic;
            text-transform: none;
            font-size: 1rem;
            letter-spacing: 1px;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
