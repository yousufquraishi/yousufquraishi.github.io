    <style>
        :root {
            --bg-color: #FDFBF7; /* Warm Cream */
            --text-color: #2B2B2B; /* Charcoal */
            --accent-color: #9E1B22; /* Deep Crimson */
            --gold-accent: #D4AF37;
        }
        
        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-image {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-bottom: 3px solid var(--accent-color);
        }

        .container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 5px;
            color: var(--text-color);
            font-weight: normal;
        }

        h2 {
            font-size: 1.6rem;
            margin-top: 0;
            color: var(--accent-color);
            font-style: italic;
            margin-bottom: 30px;
        }

        p.instructions {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #555;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            text-align: center;
        }

        .search-box:focus {
            border-color: var(--accent-color);
        }

        #results {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .guest-card {
            background: white;
            border: 1px solid #ddd;
            border-left: 5px solid var(--accent-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease-in;
            text-align: left;
        }

        .guest-name {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .table-info {
            text-align: right;
        }
        
        .table-label {
            font-size: 0.8rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-number {
            font-size: 2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 1px;
        }
    </style>
</head>
